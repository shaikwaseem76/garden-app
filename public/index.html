<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    
    <meta name="theme-color" content="#2f3640" />
    
    <meta
      name="description"
      content="Smart Irrigation System for Government Polytechnic, Dharmavaram"
    />

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <title>Smart Irrigation - GPT Dharmavaram</title>

    <style>
      /* Clean background and prevents blue highlight on taps */
      body { 
        margin: 0; 
        background-color: #f0f2f5; 
        -webkit-tap-highlight-color: transparent;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    
    <div id="root"></div>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./service-worker.js')
            .then(reg => {
              console.log('PWA Service Worker Registered Successfully');
            })
            .catch(err => {
              console.log('PWA Service Worker Registration Failed: ', err);
            });
        });
      }
    </script>
  </body>
</html>
